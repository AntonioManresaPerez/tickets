services:
  db:
    image: postgres:16-alpine
    container_name: tickets-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: tickets_dev_pw
      POSTGRES_DB: tickets
    ports:
      - "5433:5432"
    volumes:
      - tickets_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Interfaz web ligera para inspeccionar la base de datos en http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: tickets-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  tickets_pgdata:
